<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theme Switcher</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="dropdown-wrapper">
        <button id="theme-switcher-button" aria-haspopup="true" aria-expanded="false" aria-controls="theme-dropdown">Switch Theme <span class="arrow">▾</span></button>

        <ul id="theme-dropdown" role="menu" aria-labelledby="theme-switcher-button" hidden>
          <li id="theme-dawn" role="menuitem">dawn</li>
          <li id="theme-midnight" role="menuitem">midnight</li>
          <li id="theme-forest" role="menuitem">forest</li>
          <li id="theme-ocean" role="menuitem">ocean</li>
          <li id="theme-lavender" role="menuitem">lavender</li>
        </ul>
      </div>

      <div aria-live="polite" id="theme-message"></div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
