<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DrumKit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="drum-machine">
      <div class="machine-title">
        DrumKit
        <span>click or press key</span>
      </div>

      <div id="pad-bank">
        <button class="drum-pad" id="Heater-1" data-label="Heater 1">Q<audio class="clip" id="Q" src="https://cdn.freecodecamp.org/curriculum/drum/Heater-1.mp3"></audio></button>
        <button class="drum-pad" id="Heater-2" data-label="Heater 2">W<audio class="clip" id="W" src="https://cdn.freecodecamp.org/curriculum/drum/Heater-2.mp3"></audio></button>
        <button class="drum-pad" id="Heater-3" data-label="Heater 3">E<audio class="clip" id="E" src="https://cdn.freecodecamp.org/curriculum/drum/Heater-3.mp3"></audio></button>
        <button class="drum-pad" id="Heater-4" data-label="Heater 4">A<audio class="clip" id="A" src="https://cdn.freecodecamp.org/curriculum/drum/Heater-4_1.mp3"></audio></button>
        <button class="drum-pad" id="Clap" data-label="Clap">S<audio class="clip" id="S" src="https://cdn.freecodecamp.org/curriculum/drum/Heater-6.mp3"></audio></button>
        <button class="drum-pad" id="Open-HH" data-label="Open-HH">D<audio class="clip" id="D" src="https://cdn.freecodecamp.org/curriculum/drum/Dsc_Oh.mp3"></audio></button>
        <button class="drum-pad" id="Kick-n-Hat" data-label="Kick-n'-Hat">Z<audio class="clip" id="Z" src="https://cdn.freecodecamp.org/curriculum/drum/Kick_n_Hat.mp3"></audio></button>
        <button class="drum-pad" id="Kick" data-label="Kick">X<audio class="clip" id="X" src="https://cdn.freecodecamp.org/curriculum/drum/RP4_KICK_1.mp3"></audio></button>
        <button class="drum-pad" id="Closed-HH" data-label="Closed-HH">C<audio class="clip" id="C" src="https://cdn.freecodecamp.org/curriculum/drum/Cev_H2.mp3"></audio></button>
      </div>

      <div class="display-area">
        <div class="display-dot" id="dot"></div>
        <p id="display">ready</p>
      </div>

      <div class="controls">
        <div class="control-row">
          <span class="control-label" id="power-label">Power: On</span>
          <label class="toggle">
            <input type="checkbox" id="power-toggle" checked />
            <span class="toggle-track"></span>
          </label>
        </div>

        <div class="control-row volume-row">
          <span class="control-label">Volume</span>
          <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" />
        </div>

        <div class="control-row">
          <span class="control-label" id="bank-label">Bank: Heater Kit</span>
          <label class="toggle">
            <input type="checkbox" id="bank-toggle" checked />
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
